<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline — ADT Sports</title>
<style>
  body{margin:0;background:#f4f1ec;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#1a1410;display:flex;min-height:100vh;align-items:center;justify-content:center;text-align:center}
  .wrap{max-width:380px;padding:30px}
  img{width:64px;height:64px;border-radius:14px;margin-bottom:18px}
  h1{font-size:22px;margin:0 0 8px;color:#D4420A}
  p{font-size:14px;line-height:1.6;color:#4a4640}
  button{margin-top:18px;background:#D4420A;color:#fff;border:0;font-weight:700;font-size:15px;padding:12px 24px;border-radius:10px;cursor:pointer}
</style>
</head>
<body>
  <div class="wrap">
    <img src="/icons/icon-192.png" alt="ADT Sports">
    <h1>You're offline</h1>
    <p>We can't reach the network right now. Check your connection and try again — recently viewed pages may still be available.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
